name: Release

# Release identity uses CalVer: v<YYYY>.<M>.<D>-<patch>
# Examples: v2026.5.22-0, v2026.5.22-1, v2026.12.31-9
#
# Cargo.toml continues to use SemVer for development (auto-bumped by
# .claude/hooks/auto-version.sh). The two coexist intentionally — see
# VERSION.md "Dual Versioning" for the why. Cargo SemVer = internal dev
# checkpoint; Git tag CalVer = public release identity.
#
# Maintainers push the tag manually:
#
#   git tag v2026.5.22-0
#   git push origin v2026.5.22-0
#
# Code-signing is NOT done yet — binaries are unsigned, distributed with
# SHA-256 checksums. Adding signing requires per-platform cert setup
# (Apple Developer for macOS, Windows Authenticode); deferred until the
# user authorizes the certs and storage location.
on:
  push:
    tags:
      # CalVer-shaped tags only — refuses ad-hoc semver tags like v0.1.0.
      # If a pre-CalVer fallback is ever needed, widen this glob carefully.
      - 'v[0-9][0-9][0-9][0-9].*'

permissions:
  contents: write  # required to create / upload to GitHub Release

# Forward-compat for the Node 24 cutover (2026-06-02). `actions/checkout@v6`
# runs on Node 24 natively; `softprops/action-gh-release@v2` still defaults to
# Node 20 (unsupported 2026-09-16), so the env below forces it onto Node 24,
# keeping the deprecation banner gone through the cutover window.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Create the release shell once before any matrix builds — eliminates
  # the race condition where parallel matrix jobs would each call
  # softprops/action-gh-release@v2 and one would lose with
  # "Validation Failed: already_exists". Now matrix jobs find the
  # release pre-existing and just append assets.
  create-release:
    name: create release shell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create empty release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF##refs/tags/}"
          # --notes-start-tag=$prev would be ideal but `gh release create`
          # auto-generates from history when --generate-notes is set;
          # safer for the first release where no prior tag exists.
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            --repo "$GITHUB_REPOSITORY"

  build:
    name: build ${{ matrix.target }} (${{ matrix.os }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          # Native ARM Linux build. GitHub offers `ubuntu-24.04-arm`
          # free for public repos — no cross-compile, no `cross` tool.
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: cargo build (release)
        env:
          BWOC_RELEASE_CALVER: ${{ github.ref_name }}
        run: cargo build --release --workspace --target ${{ matrix.target }}

      - name: Package (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist
          tag="${GITHUB_REF##refs/tags/}"
          name="bwoc-${tag}-${{ matrix.target }}"
          mkdir "$name"
          cp target/${{ matrix.target }}/release/bwoc       "$name/"
          cp target/${{ matrix.target }}/release/bwoc-agent "$name/"
          cp README.md LICENSE CHANGELOG.md                 "$name/" 2>/dev/null || true
          tar -czf "dist/${name}.tar.gz" "$name"
          shasum -a 256 "dist/${name}.tar.gz" > "dist/${name}.tar.gz.sha256"

      - name: Package (zip)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF}" -replace '^refs/tags/', ''
          $name = "bwoc-$tag-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          New-Item -ItemType Directory -Force -Path $name | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/bwoc.exe"       -Destination "$name/"
          Copy-Item "target/${{ matrix.target }}/release/bwoc-agent.exe" -Destination "$name/"
          Copy-Item README.md, LICENSE, CHANGELOG.md -Destination "$name/" -ErrorAction SilentlyContinue
          Compress-Archive -Path "$name" -DestinationPath "dist/$name.zip"
          $h = (Get-FileHash -Algorithm SHA256 "dist/$name.zip").Hash.ToLower()
          "$h  $name.zip" | Out-File -Encoding ascii "dist/$name.zip.sha256"

      - name: Upload assets to existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${GITHUB_REF##refs/tags/}"
          # Upload every artifact in dist/ to the release created by
          # the create-release job. `gh release upload --clobber` is
          # idempotent — replays of a rerun-after-failure scenario won't
          # error on duplicate asset names.
          gh release upload "$tag" dist/* --clobber --repo "$GITHUB_REPOSITORY"

  # Keep the Homebrew tap honest (issue #52). Before this job, release.yml
  # built binaries + .sha256 sidecars but never touched Formula/bwoc.rb, so
  # the formula drifted (pinned at 2.0.0 while releases reached 2.4.0 — a
  # stale `brew install`). `needs: build` => all sidecars exist before we
  # rewrite the formula from them.
  #
  # Direct-to-default-branch (not a PR): the release is already cut, so the
  # tap — which serves HEAD — must become correct immediately; a PR would
  # leave it stale until someone merges. The bump is mechanical (version +
  # urls + shas from the just-published sidecars), so there is nothing for a
  # human review gate to catch that the in-job verification does not.
  bump-formula:
    name: bump Homebrew formula
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Commit onto the default branch (the tap serves its HEAD), not
          # the detached tag ref the push event would otherwise check out.
          ref: ${{ github.event.repository.default_branch }}
          # Prefer a PAT so the formula-bump PR is authored by a real identity
          # and therefore triggers CI (a GITHUB_TOKEN-opened PR does not — see
          # the bump step below). Falls back to GITHUB_TOKEN if unset.
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - name: Rewrite Formula/bwoc.rb from the released sidecars
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          mkdir -p sidecars
          # Only the 4 unix tar.gz sidecars the formula consumes; the
          # Windows .zip.sha256 doesn't match this glob and is skipped.
          gh release download "$tag" \
            --pattern '*.tar.gz.sha256' \
            --dir sidecars \
            --repo "$GITHUB_REPOSITORY"
          ./scripts/bump-formula.sh "$tag" sidecars

      - name: Open an auto-merging formula-bump PR if the formula changed
        # `main` is protected (required status checks), so the bump can't be
        # pushed directly — it lands via an auto-merged PR. NOTE: a PR opened
        # with the default GITHUB_TOKEN does NOT trigger CI (GitHub's recursion
        # guard), so the required checks never run and auto-merge stalls. Set a
        # repo secret RELEASE_PAT (a PAT with `repo` + `workflow`) — the
        # checkout above uses it so the push/PR carry a real identity and CI
        # fires. Without it, a maintainer must re-run CI on the bump PR.
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- Formula/bwoc.rb; then
            echo "Formula already current for ${GITHUB_REF_NAME} — nothing to do."
            exit 0
          fi
          branch="chore/formula-${GITHUB_REF_NAME}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add Formula/bwoc.rb
          git commit \
            -m "chore(formula): bump Homebrew formula to ${GITHUB_REF_NAME}" \
            -m "Auto-generated by release.yml on tag publish; version + 4 url fragments + 4 sha256 synced to the released sidecars. Lands via auto-merge because main is a protected branch."
          git push origin "$branch"
          gh pr create \
            --base "${{ github.event.repository.default_branch }}" \
            --head "$branch" \
            --title "chore(formula): bump Homebrew formula to ${GITHUB_REF_NAME}" \
            --body "Automated Homebrew formula bump for ${GITHUB_REF_NAME} — version + url + sha256 synced to the released sidecars. Auto-merges once CI is green."
          gh pr merge "$branch" --squash --auto --delete-branch
