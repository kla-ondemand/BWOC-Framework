name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Forward-compat for the Node 24 cutover (2026-06-02). `actions/checkout@v6`
# runs on Node 24 natively; the env below forces any other JS actions still
# defaulting to Node 20 (unsupported 2026-09-16) onto Node 24, so the
# deprecation banner stays gone through the cutover window.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Quality gates — fmt + clippy. Run once on Linux because the rules
  # are platform-independent and there's no value in repeating them
  # three times.
  quality:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # Build + test on every platform the toolkit advertises support for
  # (macOS · Linux · Windows). The Status badge in README.md claims
  # all three; this matrix backs the claim.
  #
  # Two known limitations:
  #   - `bwoc-agent --serve` uses Unix domain sockets and signal-0 for
  #     liveness checks; Windows builds compile but the `--serve` path
  #     is a no-op there. Tests stay platform-agnostic (cfg-gated).
  #   - Some unit tests touch tempdirs under /tmp; cargo's TMPDIR
  #     handling is portable, so no platform-specific harness needed.
  build-and-test:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          # `bwoc-harness` is Unix-first in v1: its tool layer shells out to a
          # POSIX shell and its sandbox / denial tests assume Unix commands
          # (`pwd`, `rm -rf`, …). The crate still BUILDS on Windows (build step
          # below); only its TESTS are scoped to Unix. Windows support for the
          # harness is a tracked follow-up — see docs/en/HARNESS.en.md §Caveats.
          - os: windows-latest
            test_exclude: --exclude bwoc-harness
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --workspace --verbose
      - run: cargo test --workspace ${{ matrix.test_exclude }} --verbose
