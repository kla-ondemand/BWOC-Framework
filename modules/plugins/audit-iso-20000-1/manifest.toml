[plugin]
name        = "audit-iso-20000-1"
kind        = "audit"
version     = "0.2.0"
description = "ISO/IEC 20000-1 IT Service Management System audit — attestation + sample runtime (BWOC-33)."
compat      = ">=2.7.0"
entry       = "audit.sh"

# [config.schema] intentionally omitted. v0.2.0 adopts two per-criterion
# array-of-tables on the workspace's [plugins.audit-iso-20000-1] block —
# .attestations (criterion_id + statement + signer + signed_at + optional
# valid_through) and .samples (criterion_id + summary + sampled_count +
# sampled_of + optional window). Those shapes are not a key/value config and
# are documented in SPEC.md §Configuration, not as a manifest schema. The
# universal `enabled` key is the only manifest-declared surface.
