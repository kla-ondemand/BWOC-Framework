title: BWOC Framework
description: Buddhist Way of Coding — a backend-neutral framework for AI coding agents
remote_theme: just-the-docs/just-the-docs@v0.10.0
plugins:
  - jekyll-remote-theme
  - jekyll-relative-links
  - jekyll-seo-tag
relative_links:
  enabled: true
  collections: true

# --- Just the Docs (GitBook-like) settings ---
color_scheme: light
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
heading_anchors: true
aux_links:
  GitHub:
    - https://github.com/bemindlabs/BWOC-Framework
aux_links_new_tab: true
back_to_top: true
back_to_top_text: "Back to top"
footer_content: 'BWOC — Buddhist Way of Coding. Pali terms are section names; the content is technical.'

include:
  - en
  - th
exclude:
  - _config.yml
defaults:
  - scope:
      path: ""
    values:
      layout: default
