[plugin]
name        = "audit-iso-27001"
kind        = "audit"
version     = "0.2.0"
description = "ISO/IEC 27001 Information Security Management System audit — attestation + SoA-driven sample runtime (BWOC-34)."
compat      = ">=2.5.0"
entry       = "audit.sh"

# [config.schema] intentionally omitted. v0.2.0 adopts three per-criterion
# array-of-tables on the workspace's [plugins.audit-iso-27001] block —
# .attestations (criterion_id + statement + signer + signed_at + optional
# valid_through), .soa (the Statement of Applicability: control + applicable +
# justification), and .samples (criterion_id + summary + optional window).
# Those shapes are not a key/value config and are documented in SPEC.md
# §Configuration, not as a manifest schema. The universal `enabled` key is the
# only manifest-declared surface.
