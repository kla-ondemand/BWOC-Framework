[skill]
name        = "gcloud-ops"
version     = "0.1.0"
description = "Agent-facing read-mostly GCP operations driven through the gcloud-auth + gcloud-project workflow plugins via the bwoc gcloud CLI."
maturity    = "L1"

[contract]
requires         = []                  # other framework skills this depends on
requires_plugins = ["workflow"]        # plugin KINDS this skill needs enabled — both gcloud plugins are kind=workflow
exposes          = [
  "whoami",
  "current-project",
  "switch-project",
]

[gates]
verify      = "bwoc skill verify gcloud-ops"
