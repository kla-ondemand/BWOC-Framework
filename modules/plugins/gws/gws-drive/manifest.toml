[plugin]
name        = "gws-drive"
kind        = "gws"
version     = "0.1.0"
description = "Reference gws plugin — read-mostly Google Drive adapter: lists files (files.list) and reads a single file's metadata (files.get), each projected into the normative Drive file shape. Never writes back to Drive. Sources the OAuth credential helpers from the sibling gws-auth foundation; requires the drive.readonly scope."
compat      = ">=2.10.0"
entry       = "gws.sh"

# [config.schema] intentionally omitted.
#
# This plugin holds no config of its own. Credentials resolve at runtime through
# the sibling gws-auth foundation (BWOC_GWS_TOKEN env / .bwoc/secrets/gws-token.json),
# never from workspace config. The only workspace-level surface is the universal
# `enabled` key on [plugins.gws-drive]. See SPEC.md §Configuration.
