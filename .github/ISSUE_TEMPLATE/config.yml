# Issue-template chooser config.
# GitHub Discussions is not enabled on this repo, so off-template questions
# route to email and security disclosure to SECURITY.md — not a Discussions tab.
blank_issues_enabled: false
contact_links:
  - name: Security disclosure (do not open a public issue)
    url: https://github.com/bemindlabs/BWOC-Framework/blob/main/SECURITY.md
    about: Report a vulnerability privately. See SECURITY.md for the disclosure process.
  - name: Questions & support
    url: mailto:info@bemind.tech
    about: General questions, setup help, and contact — email the maintainers.
