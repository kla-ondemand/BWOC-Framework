[plugin]
name        = "memory-tier2-noop"
kind        = "memory-backend"
version     = "0.1.0"
description = "No-op Tier 2 memory backend that forwards to Tier 1."
compat      = ">=2.7.0"
entry       = "bwoc-plugin-memory-tier2-noop"

# [config.schema] intentionally omitted — the no-op forwards every call to
# Tier 1 and reads no settings of its own. The operator's `[plugins.memory-tier2-noop]`
# block in workspace.toml may carry only the universal `enabled` key.
